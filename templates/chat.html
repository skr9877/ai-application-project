<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 상담</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 620px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4f46e5;
            color: white;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header span {
            font-size: 12px;
            opacity: 0.8;
            display: block;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #999;
            font-size: 12px;
        }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus {
            border-color: #4f46e5;
        }

        .chat-input button {
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input button:hover {
            background: #4338ca;
        }

        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            AI 상담원
            <span>무엇이든 물어보세요</span>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message system">상담을 시작합니다.</div>
        </div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="메시지를 입력하세요..." autocomplete="off" />
            <button id="sendBtn">&#9658;</button>
        </div>
    </div>

    <script>
        const sessionId = "{{ session_id }}";
        const ws = new WebSocket(`ws://${location.host}/ws/${sessionId}`);
        const messages = document.getElementById("messages");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");

        ws.onopen = () => {
            sendBtn.disabled = false;
        };

        ws.onmessage = (e) => {
            const text = e.data;
            const div = document.createElement("div");

            if (text.startsWith("고객: ")) {
                div.className = "message user";
                div.textContent = text.replace("고객: ", "");
            } else if (text.startsWith("AI: ")) {
                div.className = "message ai";
                div.textContent = text.replace("AI: ", "");
            } else {
                div.className = "message system";
                div.textContent = text;
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        };

        ws.onclose = () => {
            const div = document.createElement("div");
            div.className = "message system";
            div.textContent = "연결이 종료되었습니다.";
            messages.appendChild(div);
            sendBtn.disabled = true;
        };

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            ws.send(text);
            input.value = "";
        }

        sendBtn.onclick = sendMessage;
        input.onkeydown = (e) => {
            if (e.key === "Enter") sendMessage();
        };

        sendBtn.disabled = true;
    </script>
</body>
</html>
