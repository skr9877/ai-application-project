<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 상담</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
            background: #eef2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 640px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(79,70,229,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header .info .name {
            font-size: 15px;
            font-weight: 700;
        }

        .chat-header .info .status {
            font-size: 12px;
            opacity: 0.75;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9ff;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d0d5f7; border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }

        .msg-row.ai .bubble-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
        }

        .msg-row.user .bubble {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-row.ai .bubble {
            background: white;
            color: #1e1e2e;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }

        .msg-time {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 2px;
            flex-shrink: 0;
        }

        .system-msg {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            padding: 4px 12px;
            background: #ececf5;
            border-radius: 20px;
            align-self: center;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            width: fit-content;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #c0bef5;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .chat-input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #eeeef5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid #e0e0f0;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            background: #f8f9ff;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #4f46e5;
            background: white;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }

        .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🐧</div>
            <div class="info">
                <div class="name">AI 상담원</div>
                <div class="status" id="statusText">연결 중...</div>
            </div>
        </div>

        <div class="chat-messages" id="messages">
            <div class="system-msg">상담을 시작합니다.</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="input" placeholder="메시지를 입력하세요..." autocomplete="off" disabled />
            <button class="send-btn" id="sendBtn" disabled>
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const sessionId = "{{ session_id }}";
        const ws = new WebSocket(`ws://${location.host}/ws/${sessionId}`);
        const messages = document.getElementById("messages");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");
        const statusText = document.getElementById("statusText");

        function getTime() {
            return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, type) {
            if (type === "system") {
                const div = document.createElement("div");
                div.className = "system-msg";
                div.textContent = text;
                messages.appendChild(div);
            } else {
                const row = document.createElement("div");
                row.className = `msg-row ${type}`;

                if (type === "ai") {
                    const avatar = document.createElement("div");
                    avatar.className = "bubble-avatar";
                    avatar.textContent = "🤖";
                    row.appendChild(avatar);
                }

                const bubble = document.createElement("div");
                bubble.className = "bubble";
                bubble.textContent = text;

                const time = document.createElement("div");
                time.className = "msg-time";
                time.textContent = getTime();

                if (type === "user") {
                    row.appendChild(time);
                    row.appendChild(bubble);
                } else {
                    row.appendChild(bubble);
                    row.appendChild(time);
                }

                messages.appendChild(row);
            }

            messages.scrollTop = messages.scrollHeight;
        }

        // 타이핑 인디케이터
        const typingRow = document.createElement("div");
        typingRow.className = "msg-row ai";
        typingRow.id = "typing";
        const typingAvatar = document.createElement("div");
        typingAvatar.className = "bubble-avatar";
        typingAvatar.textContent = "🤖";
        const typingIndicator = document.createElement("div");
        typingIndicator.className = "typing-indicator";
        typingIndicator.innerHTML = "<span></span><span></span><span></span>";
        typingRow.appendChild(typingAvatar);
        typingRow.appendChild(typingIndicator);

        function showTyping() {
            messages.appendChild(typingRow);
            typingIndicator.style.display = "flex";
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.style.display = "none";
            if (typingRow.parentNode) typingRow.parentNode.removeChild(typingRow);
        }

        ws.onopen = () => {
            statusText.textContent = "온라인";
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        };

        ws.onmessage = (e) => {
            const text = e.data;
            hideTyping();

            if (text.startsWith("SYSTEM:")) {
                addMessage(text.replace("SYSTEM:", ""), "system");
            } else if (text.startsWith("고객: ")) {
                addMessage(text.replace("고객: ", ""), "user");
            } else if (text.startsWith("AI: ")) {
                addMessage(text.replace("AI: ", ""), "ai");
            }
        };

        ws.onclose = () => {
            statusText.textContent = "오프라인";
            addMessage("연결이 종료되었습니다.", "system");
            input.disabled = true;
            sendBtn.disabled = true;
        };

        function sendMessage() {
            const text = input.value.trim();
            if (!text || sendBtn.disabled) return;
            ws.send(text);
            input.value = "";
            showTyping();
        }

        sendBtn.onclick = sendMessage;
        input.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };
    </script>
</body>
</html>
